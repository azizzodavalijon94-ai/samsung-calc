<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калкулятори Премиум</title>
    <style>
        body { background-color: #000; color: white; display: flex; justify-content: center; align-items: flex-end; min-height: 100vh; margin: 0; font-family: sans-serif; }
        .calculator { width: 100%; max-width: 400px; padding: 20px; }
        
        /* Экрани ҳисобҳо */
        .display { text-align: right; margin-bottom: 20px; }
        .result { font-size: 60px; font-weight: 300; }
        
        /* Тугмаҳо */
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn { 
            height: 70px; border-radius: 35px; border: none; font-size: 24px; cursor: pointer; 
            background-color: #1c1c1c; color: white; transition: background 0.2s, transform 0.1s;
        }
        
        /* Эффект барои тугмаҳо (Эффекти Сабз) */
        .btn:active { background-color: #00796b !important; transform: scale(0.95); }
        
        .operator { background-color: #333; color: #00796b; }
        .equal { background-color: #00796b; color: white; }
        .clear { color: #e57373; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="display">
        <div id="result" class="result">0</div>
    </div>
    <div class="buttons">
        <button class="btn clear" onclick="clearDisplay()">C</button>
        <button class="btn" onclick="appendToDisplay('(')">(</button>
        <button class="btn operator" onclick="appendToDisplay('%')">%</button>
        <button class="btn operator" onclick="appendToDisplay('/')">÷</button>
        <button class="btn" onclick="appendToDisplay('7')">7</button>
        <button class="btn" onclick="appendToDisplay('8')">8</button>
        <button class="btn" onclick="appendToDisplay('9')">9</button>
        <button class="btn operator" onclick="appendToDisplay('*')">×</button>
        <button class="btn" onclick="appendToDisplay('4')">4</button>
        <button class="btn" onclick="appendToDisplay('5')">5</button>
        <button class="btn" onclick="appendToDisplay('6')">6</button>
        <button class="btn operator" onclick="appendToDisplay('-')">-</button>
        <button class="btn" onclick="appendToDisplay('1')">1</button>
        <button class="btn" onclick="appendToDisplay('2')">2</button>
        <button class="btn" onclick="appendToDisplay('3')">3</button>
        <button class="btn operator" onclick="appendToDisplay('+')">+</button>
        <button class="btn" onclick="appendToDisplay(')')">)</button>
        <button class="btn" onclick="appendToDisplay('0')">0</button>
        <button class="btn" onclick="appendToDisplay('.')">,</button>
        <button class="btn equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('result');
    function appendToDisplay(value) {
        if (display.innerText === '0') display.innerText = value;
        else display.innerText += value;
    }
    function clearDisplay() { display.innerText = '0'; }
    function calculate() {
        try { display.innerText = eval(display.innerText.replace('÷', '/').replace('×', '*')); }
        catch { display.innerText = 'Хато'; }
    }
</script>

</body>
</html>
