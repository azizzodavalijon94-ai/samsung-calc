<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ёддоштҳои Мукаммал</title>
    <style>
        /* 1. НАСТРОЙКАИ ЭКРАН ВА ФОН (Стили сиёҳи касбӣ) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 90vh;
            background: #1c1c1e; /* Ранги хокистарии торики iOS */
            border-radius: 30px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 2. ШАВҚАТИ БОЛОИ БАРНОМА (Шапка) */
        .header {
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0a84ff; /* Ранги кабуди дурахшони Apple */
        }
        .header p {
            font-size: 14px;
            color: #8e8e93;
            margin-top: 5px;
        }

        /* 3. КУТТИИ НАВИШТАН ВА ТУГМАИ ИЛОВА (Input) */
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .task-input {
            flex-grow: 1;
            background: #2c2c2e;
            border: none;
            border-radius: 12px;
            padding: 15px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }
        .task-input::placeholder {
            color: #aeaeb2;
        }
        .add-btn {
            background: #0a84ff;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 0 20px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .add-btn:active {
            background: #0056b3;
        }

        /* 4. РӮЙХАТИ КОРҲО (Дизайни элементҳо) */
        .task-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .task-item {
            background: rgba(255, 255, 255, 0.05); /* Стили шишагӣ */
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .task-text {
            font-size: 16px;
            color: #ffffff;
            max-width: 70%;
            word-break: break-all;
        }
        .delete-task-btn {
            background: #ff453a; /* Ранги сурхи хавфноки iOS */
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .delete-task-btn:active {
            background: #cc3b33;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- ТАРАФИ БОЛО -->
        <div class="header">
            <h1>📝 Рӯйхати Корҳо</h1>
            <p>Барои имрӯз чӣ нақша доред, Бародар?</p>
        </div>

        <!-- СЕКЦИЯИ ИЛОВА КАРДАН -->
        <div class="input-section">
            <input type="text" id="taskInput" class="task-input" placeholder="Кори навро нависед...">
            <button class="add-btn" onclick="addTask()">➕</button>
        </div>

        <!-- РӮЙХАТИ АСОСӢ -->
        <ul id="taskList" class="task-list">
            <!-- Корҳо бо коди JavaScript дар ин ҷо пайдо мешаванд -->
        </ul>
    </div>

    <!-- ⚡ АКНУН МАЙНАИ БАРНОМА (JAVASCRIPT) ⚡ -->
    <script>
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');

        // 1. БОР КАРДАНИ КОРҲОИ САБТШУДА АЗ ХОТИРАИ ТЕЛЕФОН
        document.addEventListener('DOMContentLoaded', loadTasks);

        // 2. ФУНКСИЯИ ИЛОВА КАРДАНИ КОР
        function addTask() {
            const taskText = taskInput.value.trim();
            
            if (taskText === '') {
                alert('Бародарҷон, аввал ягон чиз нависед! 😊');
                return;
            }

            createTaskElement(taskText);
            saveTaskToLocal(taskText);
            
            taskInput.value = ''; // Тоза кардани куттии навишт пас аз илова
        }

        // 3. СОХТАНИ ЭЛЕМЕНТИ ВИЗУАЛӢ ДАР ЭКРАН
        function createTaskElement(text) {
            const li = document.createElement('li');
            li.className = 'task-item';

            li.innerHTML = `
                <span class="task-text">${text}</span>
                <button class="delete-task-btn" onclick="deleteTask(this, '${text}')">✕ Нест кардан</button>
            `;

            taskList.appendChild(li);
        }

        // 4. ФУНКСИЯИ НЕСТ КАРДАН
        function deleteTask(buttonElement, text) {
            // Нест кардан аз экран
            const item = buttonElement.parentElement;
            item.remove();

            // Нест кардан аз хотира
            removeTaskFromLocal(text);
        }

        // 5. САБТ ДАР ХОТИРАИ ЛОКАЛӢ (localStorage)
        function saveTaskToLocal(task) {
            let tasks = localStorage.getItem('my_tasks') ? JSON.parse(localStorage.getItem('my_tasks')) : [];
            tasks.push(task);
            localStorage.setItem('my_tasks', JSON.stringify(tasks));
        }

        // 6. ХОНДАН АЗ ХОТИРА ҲАНГОМИ КУШОДАНИ БАРНОМА
        function loadTasks() {
            let tasks = localStorage.getItem('my_tasks') ? JSON.parse(localStorage.getItem('my_tasks')) : [];
            tasks.forEach(function(task) {
                createTaskElement(task);
            });
        }

        // 7. ТОЗА КАРДАНИ ЯК КОР АЗ ХОТИРА
        function removeTaskFromLocal(taskToDelete) {
            let tasks = localStorage.getItem('my_tasks') ? JSON.parse(localStorage.getItem('my_tasks')) : [];
            tasks = tasks.filter(task => task !== taskToDelete);
            localStorage.setItem('my_tasks', JSON.stringify(tasks));
        }

        // АГАР ТУГМАИ ENTER-РО ДАР КЛАВИАТУРА ПАХШ КУНАД ҲАМ ИЛОВА КУНАД
        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });
    </script>

</body>
</html>
