<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }
        .calc-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
        }
        .screen {
            width: 100%;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 10px;
            word-break: break-all;
        }
        .history {
            font-size: 24px;
            color: #7d7d7d;
            margin-bottom: 5px;
            min-height: 30px;
        }
        .display {
            font-size: 48px;
            color: #ffffff;
            font-weight: 300;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        button {
            border: none;
            border-radius: 50%;
            aspect-ratio: 1;
            font-size: 28px;
            font-weight: 400;
            cursor: pointer;
            transition: filter 0.1s;
        }
        button:active {
            filter: brightness(1.3);
        }
        .btn-gray { background-color: #a5a5a5; color: #000000; }
        .btn-orange { background-color: #ff9f0a; color: #ffffff; font-weight: 500; }
        .btn-dark { background-color: #333333; color: #ffffff; }
        .btn-zero {
            grid-column: span 2;
            border-radius: 40px;
            aspect-ratio: auto;
            height: 100%;
            padding-left: 30px;
            text-align: left;
        }
        /* СЕЙФИ НАВ БО ИНДЕКСИ БЕХАТО */
        .safe-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            padding: 20px;
            flex-direction: column;
            z-index: 1000;
        }
        .safe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #222;
            margin-bottom: 20px;
        }
        .safe-title {
            color: #4cd964;
            font-size: 20px;
            font-weight: bold;
        }
        .btn-back {
            background-color: #ff3b30;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin-bottom: 20px;
        }
        .btn-upload {
            border: 2px dashed #4cd964;
            color: #4cd964;
            background-color: transparent;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            text-align: center;
            cursor: pointer;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            overflow-y: auto;
            flex-grow: 1;
            padding-bottom: 20px;
        }
        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background-color: #222;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,59,48,0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="calc-container" id="calculator">
        <div class="screen">
            <div class="history" id="history"></div>
            <div class="display" id="display">0</div>
        </div>
        <div class="buttons">
            <button class="btn-gray" onclick="clearScreen()">AC</button>
            <button class="btn-gray" onclick="appendValue('%')">%</button>
            <button class="btn-gray" onclick="deleteLast()">⌫</button>
            <button class="btn-orange" onclick="appendValue('/')">÷</button>

            <button class="btn-dark" onclick="appendValue('7')">7</button>
            <button class="btn-dark" onclick="appendValue('7')">8</button>
            <button class="btn-dark" onclick="appendValue('9')">9</button>
            <button class="btn-orange" onclick="appendValue('*')">×</button>

            <button class="btn-dark" onclick="appendValue('4')">4</button>
            <button class="btn-dark" onclick="appendValue('5')">5</button>
            <button class="btn-dark" onclick="appendValue('6')">6</button>
            <button class="btn-orange" onclick="appendValue('-')">-</button>

            <button class="btn-dark" onclick="appendValue('1')">1</button>
            <button class="btn-dark" onclick="appendValue('2')">2</button>
            <button class="btn-dark" onclick="appendValue('3')">3</button>
            <button class="btn-orange" onclick="appendValue('+')">+</button>

            <button class="btn-dark btn-zero" onclick="appendValue('0')">0</button>
            <button class="btn-dark" onclick="appendValue('.')">,</button>
            <button class="btn-orange" onclick="calculate()">=</button>
        </div>
    </div>

    <div class="safe-container" id="safe">
        <div class="safe-header">
            <div class="safe-title">🔒 СЕЙФИ МАХФӢ</div>
            <button class="btn-back" onclick="closeSafe()">Бурдан</button>
        </div>
        
        <div class="upload-btn-wrapper">
            <button class="btn-upload">➕ ИЛОВА КАРДАНИ СУРАТ</button>
            <input type="file" id="imageInput" accept="image/*" multiple onchange="saveImages()" />
        </div>

        <div class="gallery" id="gallery"></div>
    </div>

    <script>
        let display = document.getElementById('display');
        let history = document.getElementById('history');
        let currentInput = '0';
        const SECRET_CODE = '1987'; 

        function updateDisplay() {
            display.innerText = currentInput;
        }

        function appendValue(val) {
            if (currentInput === '0' && !isNaN(val)) {
                currentInput = val;
            } else {
                currentInput += val;
            }
            updateDisplay();
        }

        function clearScreen() {
            currentInput = '0';
            history.innerText = '';
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function calculate() {
            if (currentInput === SECRET_CODE) {
                openSafe();
                clearScreen();
                return;
            }
            try {
                history.innerText = currentInput;
                let result = eval(currentInput.replace('×', '*').replace('÷', '/'));
                currentInput = String(result);
                updateDisplay();
            } catch {
                currentInput = 'Хато';
                updateDisplay();
            }
        }

        // БАЗАИ БЕХАТОР БАРОИ СУРАТҲО
        let db;
        const request = indexedDB.open("SamsungSecretSafe", 1);

        request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("secret_gallery")) {
                db.createObjectStore("secret_gallery", { autoIncrement: true });
            }
        };

        request.onsuccess = function(e) {
            db = e.target.result;
        };

        function openSafe() {
            document.getElementById('calculator').style.display = 'none';
            document.getElementById('safe').style.display = 'flex';
            loadImages();
        }

        function closeSafe() {
            document.getElementById('safe').style.display = 'none';
            document.getElementById('calculator').style.display = 'flex';
        }

        // ИЛОВА КАРД
